build:
  maxIssues: 0

complexity:
  LongMethod:
    threshold: 60
    ignoreAnnotated: ['Composable']
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 8
    ignoreAnnotated: ['Composable']
  TooManyFunctions:
    thresholdInClasses: 15
    thresholdInInterfaces: 15
  CyclomaticComplexMethod:
    threshold: 15

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: true
  ForbiddenComment:
    active: false
  ReturnCount:
    max: 4
    excludeGuardClauses: true
  UnusedPrivateMember:
    ignoreAnnotated: ['Preview']

naming:
  FunctionNaming:
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*|`.+`'
  MatchingDeclarationName:
    active: false

exceptions:
  TooGenericExceptionCaught:
    active: false

empty-blocks:
  active: true