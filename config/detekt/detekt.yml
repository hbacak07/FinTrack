build:
  maxIssues: 0

complexity:
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 6
    constructorThreshold: 7
  TooManyFunctions:
    thresholdInClasses: 15
  CyclomaticComplexMethod:
    threshold: 15

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: true
  ForbiddenComment:
    active: false

naming:
  FunctionNaming:
    # Test fonksiyon adları backtick içinde boşluklu olabiliyor (örn: `combines three flows`)
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*|`.+`'

exceptions:
  TooGenericExceptionCaught:
    active: false

empty-blocks:
  active: true